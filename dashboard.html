<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="style.css" rel="stylesheet" /> 
</head>
<body>
    <header>
        <div class="container-lg" id="headerContent">
            <div class="row">
                <div class="col-md" id="appName">FinLogger</div>
                <div class="col-md-auto" id="tagline">Your financial diary!</div>
            </div>
        </div>
    </header>
    <div class="container-lg" >
        <div class="row" id="rowOne">
            <div class="col-md" id="sectionHeading">OVERVIEW</div>
            <div class="col-md-auto">
                <input type="month" id="monthFilter" value="2020-01" class="form-control"/>
                <button type="button" class="btn btn-primary ml-4 float-end expButton" data-mode="add" id="addExpense">Add Expense</button>
            </div>
        </div>
        <div class="row" id="rowTwo">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <div class="d-flex align-items-center">
                            <div class="mr-3">
                                <!-- Icon -->
                                <img src="./images/images/spending.png" alt="Expenses"/>
                            </div>
                            <div class="card-content">
                                <!-- Text -->
                                <p class="card-text">Expenses</p>
                                <h5 class="card-title" id="totalExpenses"></h5>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <div class="d-flex align-items-center">
                            <div class="mr-3">
                                <!-- Icon -->
                                <img src="./images/images/income.png" alt="monthlyIncome"/>
                            </div>
                            <div class="card-content">
                                <!-- Text -->
                                <p class="card-text">Monthly Income</p>
                                <h5 class="card-title" id="income"></h5>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <div class="d-flex align-items-center">
                            <div class="mr-3">
                                <!-- Icon -->
                                <img src="./images/images/balance.png" alt="balance"/>
                            </div>
                            <div class="card-content">
                                <!-- Text -->
                                <p class="card-text">Balance</p>
                                <h5 class="card-title" id="balance"></h5>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="row" id="rowThree">
            <div class="col-md-4">
                <p>Expense Summary</p>
                <table id="expense-summary" class="table border">
                    <thead>
                        <tr>
                            <th>EXPENSE CATEGORY</th>
                            <th>%</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
            <div class="col-md-8">
                <p>Expense Details</p>
                <table id="expense-details" class="table border">
                    <thead>
                        <tr>
                            <th>DATE</th>
                            <th>DESCRIPTION</th>
                            <th>AMOUNT</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal Window for adding expenses -->
    <div class="modal" tabindex="-1" id="expenseModal" role="dialog" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Add Expenses</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                
                <div class="modal-body">
                    <form id="expenseForm">
                        <div class="form-group">
                            <label for="date">Date</label>
                            <input type="date" class="form-control" id="date"/>

                            <label for="category">Category</label>
                            <select class="form-control" id="category">
                                <option value="">--Select Category--</option>
                            </select>

                            <label for="description">Description</label>
                            <input type="text" class="form-control" id="description" placeholder="Enter description"/>

                            <label for="amount">Amount</label>
                            <input type="number" class="form-control" id="amount" placeholder="Enter amount"/>
                        </div>
                    </form>
                </div>
                
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="expense-submit-btn">Submit</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script> 
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="data.js"></script> 
    <script src="script.js"></script> 
</body>
</html>
